name: Daily Update

# 每日自动抓取最新交易日数据并重新生成看板 HTML。
# 触发：北京时间 06:00（= UTC 前一日 22:00）定时 + 手动。
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 用于把更新后的数据/HTML 提交回仓库

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI-quant-lab/turtle-trading
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas

      - name: Fetch latest data (incremental)
        run: python update_turtle_data.py

      - name: Regenerate dashboard
        run: python gen_task4_turtle_dashboard.py

      - name: Commit & push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI-quant-lab/turtle-trading/data/ \
                  AI-quant-lab/turtle-trading/task4_turtle_dashboard.html
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily turtle data update $(date +%F)"
            git push
          fi
