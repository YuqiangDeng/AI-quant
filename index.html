<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化交易数据分析面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;max-width:600px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
h1{font-size:24px;font-weight:600;margin-bottom:6px;color:#1a1a1a}
.sub{font-size:14px;color:#888;margin-bottom:24px}
.links{display:flex;flex-direction:column;gap:12px}
.link-card{display:flex;align-items:center;padding:16px 20px;border-radius:12px;border:1px solid #eee;text-decoration:none;transition:all .2s;background:#fafafa}
.link-card:hover{border-color:#ccc;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.link-card .icon{font-size:28px;margin-right:16px;width:40px;text-align:center}
.link-card .info{flex:1}
.link-card .title{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.link-card .desc{font-size:12px;color:#999}
.link-card .arrow{color:#ccc;font-size:18px}
.footer{margin-top:24px;text-align:center;font-size:12px;color:#bbb}
</style>
</head>
<body>
<div class="card">
  <h1>📊 量化交易数据面板</h1>

</html>
