name: Deploy Pages

# 把 AI-quant-lab/ 整个作品集站点部署到 GitHub Pages。
# 触发：推送到 main 且 AI-quant-lab 任意内容有变动（含 daily_update 提交）、或手动。
on:
  push:
    branches: [main]
    paths:
      - "AI-quant-lab/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 整个 AI-quant-lab 即站点根：index.html 为作品集首页，
          # 各子目录（task1/ task2/ task3/ turtle-trading/ market/）为独立页面，
          # 共享 assets/（site.css / nav.js / back.js / vendor）。
          path: AI-quant-lab

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
