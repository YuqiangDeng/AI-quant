// Format dates: YYYYMMDD -> YYYY-MM-DD
function fmtDate(d) {
  return d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8);
}

// Prepare data
const dates = allData.map(d => fmtDate(d[0]));
const kdata = allData.map(d => [d[1], d[4], d[3], d[2]]); // [open, close, low, high]
const volumes = allData.map(d => d[5]);
const amounts = allData.map(d => d[6]);

// Summary stats
const last = allData[0];
const first = allData[allData.length - 1];
const highPrices = allData.map(d => d[2]);
const lowPrices = allData.map(d => d[3]);
const rangeHigh = Math.max(...highPrices);
const rangeLow = Math.min(...lowPrices);
const rangeChange = ((last[4] - first[4]) / first[4] * 100).toFixed(2);

document.getElementById('lastClose').textContent = '¥' + last[4].toFixed(2);
const pctVal = last[5]; // pct_chg field not directly available, compute from close vs open
const chgClass = last[4] >= last[1] ? 'up' : 'down';
document.getElementById('lastChangePct').textContent = ((last[4] - last[1]) / last[1] * 100).toFixed(2) + '%';
document.getElementById('lastChangePct').className = 'val ' + chgClass;
document.getElementById('rangeHigh').textContent = '¥' + rangeHigh.toFixed(2);
document.getElementById('rangeLow').textContent = '¥' + rangeLow.toFixed(2);
document.getElementById('rangeChange').textContent = rangeChange + '%';
document.getElementById('rangeChange').className = 'val ' + (rangeChange >= 0 ? 'up' : 'down');

// Time filter logic
function filterData(months) {
  const count = Math.min(months * 21, allData.length);
  return {
    dates: dates.slice(0, count).reverse(),
    kdata: kdata.slice(0, count).reverse(),
    volumes: volumes.slice(0, count).reverse()
  };
}

// Current filter
let currentFilter = { dates, kdata, volumes };

// Create K-line chart
const klineChart = echarts.init(document.getElementById('klineChart'));
const volumeChart = echarts.init(document.getElementById('volumeChart'));

function renderCharts(filtered) {
  const d = filtered.dates;
  const k = filtered.kdata;
  const v = filtered.volumes;

  // K-line option
  const kOption = {
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        const p = params[0];
        if (!p) return '';
        const idx = p.dataIndex;
        const row = allData[allData.length - 1 - idx];
        const isUp = row[4] >= row[1];
        return `<b>${d[idx]}</b><br/>`
          + `开: ¥${row[1].toFixed(2)}<br/>`
          + `收: ¥${row[4].toFixed(2)}<br/>`
          + `高: ¥${row[2].toFixed(2)}<br/>`
          + `低: ¥${row[3].toFixed(2)}<br/>`
          + `成交量: ${(row[5]/10000).toFixed(2)}万股<br/>`
          + `成交额: ¥${(row[6]/10000).toFixed(2)}万`;
      }
    },
    grid: { left: '6%', right: '3%', top: '10%', bottom: '8%' },
    xAxis: {
      type: 'category',
      data: d,
      axisLine: { lineStyle: { color: '#ddd' } },
      axisLabel: { fontSize: 10, color: '#999', rotate: 30 },
      axisTick: { alignWithLabel: true }
    },
    yAxis: {
      type: 'value',
      scale: true,
      splitLine: { lineStyle: { color: '#f0f0f0' } },
      axisLabel: { fontSize: 11, color: '#888', formatter: '¥{value}' }
    },
    series: [{
      type: 'candlestick',
      data: k,
      itemStyle: {
        color: '#e74c3c',
        color0: '#27ae60',
        borderColor: '#e74c3c',
        borderColor0: '#27ae60'
      },
      markLine: {
        silent: true,
        data: [
          { type: 'average', name: '均价', label: { formatter: '均价: ¥{c}', fontSize: 10 } }
        ],
        lineStyle: { color: '#999', type: 'dashed', width: 1 }
      }
    }],
    dataZoom: [
      { type: 'inside', xAxisIndex: [0], start: 0, end: 100 },
      { type: 'slider', xAxisIndex: [0], start: 0, end: 100, height: 16, bottom: 4, borderColor: '#ddd', fillerColor: 'rgba(55,138,221,0.1)' }
    ]
  };

  // Volume option
  const vColors = k.map(row => row[0] <= row[1] ? '#27ae60' : '#e74c3c');
  const vOption = {
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        const p = params[0];
        if (!p) return '';
        return `${d[p.dataIndex]}<br/>成交量: ${(v[p.dataIndex]/10000).toFixed(2)}万股`;
      }
    },
    grid: { left: '6%', right: '3%', top: '8%', bottom: '8%' },
    xAxis: {
      type: 'category',
      data: d,
      axisLabel: { show: false },
      axisLine: { show: false },
      axisTick: { show: false }
    },
    yAxis: {
      type: 'value',
      scale: true,
      splitLine: { show: false },
      axisLabel: { fontSize: 10, color: '#888', formatter: v => (v/10000).toFixed(0) + '万' }
    },
    series: [{
      type: 'bar',
      data: v.map((val, i) => ({
        value: val,
        itemStyle: { color: vColors[i] }
      })),
      barWidth: '50%'
    }]
  };

  klineChart.setOption(kOption, true);
  volumeChart.setOption(vOption, true);
}

// Initial render (1 year)
renderCharts(currentFilter);

// Handle resize
window.addEventListener('resize', () => {
  klineChart.resize();
  volumeChart.resize();
});

// Time range buttons
const buttons = [
  { id: 'btn1m', months: 1 },
  { id: 'btn3m', months: 3 },
  { id: 'btn6m', months: 6 },
  { id: 'btn1y', months: 12 }
];

buttons.forEach(btn => {
  const el = document.getElementById(btn.id);
  el.addEventListener('click', () => {
    document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const filtered = filterData(btn.months);
    currentFilter = filtered;
    renderCharts(filtered);
  });
});
