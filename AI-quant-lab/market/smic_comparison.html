// ===== KPI Table =====
function fmt(v, d=2) { return v.toFixed(d); }
function chgClass(v) { return v >= 0 ? 'up' : 'down'; }

const aPrices = aData.map(d => d[4]);
const hPrices = hData.map(d => d[4]);

const hHigh = Math.max(...hData.map(d=>d[2]));
const hLow = Math.min(...hData.map(d=>d[3]));

const aRange = (aCloseN - aClose0)/aClose0*100;
const hRange = (hCloseN - hClose0)/hClose0*100;

// Compute daily returns for volatility
function vol(arr) {
  const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((s,v)=>s+(v-mean)**2,0)/arr.length);
}
const aReturns = aData.slice(1).map((d,i) => (d[4]-aData[i][4])/aData[i][4]);

function makeKOption(dates, kData) {
  return {
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross' },
      formatter: function(ps) {
        const p = ps[0]; if(!p) return '';
        const d = kData[p.dataIndex];
        return `<b>${dates[p.dataIndex]}</b><br/>开: ¥${d[0].toFixed(2)}<br/>收: ¥${d[1].toFixed(2)}<br/>高: ¥${d[3].toFixed(2)}<br/>低: ¥${d[2].toFixed(2)}`;
      }
    },
    grid: { left: '8%', right: '6%', top: '8%', bottom: '6%' },
    xAxis: { type: 'category', data: dates, axisLabel: { fontSize: 9, rotate: 30, interval: 'auto' }, axisLine: { lineStyle: { color: '#ddd' } } },
    yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { fontSize: 10, formatter: '¥{value}' } },
    series: [{
      type: 'candlestick', data: kData,
      itemStyle: { color: '#e74c3c', color0: '#27ae60', borderColor: '#e74c3c', borderColor0: '#27ae60' }
    }],
    dataZoom: [{ type: 'inside', start: 0, end: 100 }]
  };
}

    dataZoom: [{ type: 'inside', start: 0, end: 100 }]

  // AH premium = (A_price - H_price_in_CNY) / H_price_in_CNY * 100
  // Approx: using ~1.07 HKD/CNY as rough rate
  const rate = 1.07;
  const hCny = hData[i] ? hData[i][4] / rate : d[4];
  if(!hData[i]) return null;
  return ((d[4] - hCny) / hCny * 100).toFixed(2) * 1;
}).filter(v => v !== null);
